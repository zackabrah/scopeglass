name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        node: [22.17.0, 24.x, 26.x]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false

      - name: Pin npm
        run: npm install --global npm@10.9.8 --ignore-scripts

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Run deterministic verification
        run: npm run verify

      - name: Audit high-severity vulnerabilities
        run: npm run audit

  browser:
    name: Browser security and accessibility
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22.17.0
          package-manager-cache: false

      - name: Pin npm
        run: npm install --global npm@10.9.8 --ignore-scripts

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Install isolated browser engines
        run: node node_modules/playwright-core/cli.js install --with-deps chromium firefox webkit

      - name: Run browser security and accessibility checks
        run: npm run browser:check

      - name: Preserve browser evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-qa-${{ github.run_id }}
          path: .browser-artifacts/
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true

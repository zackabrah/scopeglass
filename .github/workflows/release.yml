name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  publish:
    name: Verify and stage exact package
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Verify tag belongs to protected main
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor HEAD refs/remotes/origin/main

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.x
          package-manager-cache: false

      - name: Pin build npm
        run: npm install --global npm@10.9.8 --ignore-scripts

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Validate release tag
        run: npm run release:check

      - name: Install isolated browser engines
        run: node node_modules/playwright-core/cli.js install --with-deps chromium firefox webkit

      - name: Run browser security and accessibility checks
        run: npm run browser:check

      - name: Preserve browser evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-browser-qa-${{ github.run_id }}
          path: .browser-artifacts/
          if-no-files-found: warn
          retention-days: 30
          include-hidden-files: true

      - name: Build and verify package once
        run: npm run verify

      - name: Verify checkout stayed clean
        run: |
          git diff --exit-code
          git diff --cached --exit-code
          test -z "$(git status --porcelain --untracked-files=normal)"

      - name: Verify registry signatures
        run: npm run audit:signatures

      - name: Audit high-severity vulnerabilities
        run: npm run audit

      - name: Preserve verified package candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-${{ github.run_id }}
          path: .artifacts/
          if-no-files-found: error
          retention-days: 90
          include-hidden-files: true

      - name: Install OIDC and staged-publishing capable npm
        run: npm install --global npm@11.18.0 --ignore-scripts

      - name: Stage the verified tarball with provenance
        run: npm run release:stage

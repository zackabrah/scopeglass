<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" role="img" aria-labelledby="title">
  <title id="title">Scopeglass</title>
  <!-- Stacked AGENTS.md scopes, root to target -->
  <g stroke-linecap="round">
    <rect x="26" y="46" width="60" height="80" rx="8" fill="#0a0a0a" stroke="#333333" stroke-width="2.5"/>
    <rect x="44" y="33" width="60" height="80" rx="8" fill="#0a0a0a" stroke="#525252" stroke-width="2.5"/>
    <rect x="62" y="20" width="60" height="80" rx="8" fill="#0a0a0a" stroke="#ededed" stroke-width="3"/>
    <!-- instruction lines on the front scope -->
    <line x1="74" y1="39" x2="110" y2="39" stroke="#737373" stroke-width="3.5"/>
    <line x1="74" y1="52" x2="102" y2="52" stroke="#737373" stroke-width="3.5"/>
    <line x1="74" y1="65" x2="94" y2="65" stroke="#404040" stroke-width="3.5"/>
  </g>
  <!-- Lens: the rule in scope -->
  <g>
    <circle cx="112" cy="93" r="29" fill="#4cc39a" fill-opacity="0.1" stroke="#4cc39a" stroke-width="5"/>
    <line x1="97" y1="93" x2="127" y2="93" stroke="#4cc39a" stroke-width="5" stroke-linecap="round"/>
    <line x1="134" y1="115" x2="152" y2="133" stroke="#4cc39a" stroke-width="8" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="186" y="94" font-family="'Geist', Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="54" font-weight="650" letter-spacing="-2.2" fill="#ededed">scopeglass</text>
  <text x="189" y="124" font-family="'Geist', Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="500" letter-spacing="2.6" fill="#a1a1a1">SEE EVERY RULE IN THE ROOM</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" role="img" aria-labelledby="title">
  <title id="title">Scopeglass</title>
  <!-- Stacked AGENTS.md scopes, root to target -->
  <g stroke-linecap="round">
    <rect x="24" y="46" width="62" height="82" rx="9" fill="#eceae1" stroke="#c9cfc8" stroke-width="3"/>
    <rect x="42" y="33" width="62" height="82" rx="9" fill="#f5f4ee" stroke="#a9b3ac" stroke-width="3"/>
    <rect x="60" y="20" width="62" height="82" rx="9" fill="#fffefa" stroke="#17201d" stroke-width="3.5"/>
    <!-- instruction lines on the front scope -->
    <line x1="72" y1="40" x2="110" y2="40" stroke="#64716c" stroke-width="4.5"/>
    <line x1="72" y1="54" x2="102" y2="54" stroke="#64716c" stroke-width="4.5"/>
    <line x1="72" y1="68" x2="94" y2="68" stroke="#d8ddd7" stroke-width="4.5"/>
  </g>
  <!-- Lens: the rule in scope -->
  <g>
    <circle cx="112" cy="94" r="30" fill="#dcebe5" fill-opacity="0.55" stroke="#146b53" stroke-width="6"/>
    <line x1="96" y1="94" x2="128" y2="94" stroke="#146b53" stroke-width="6" stroke-linecap="round"/>
    <line x1="135" y1="117" x2="154" y2="136" stroke="#146b53" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="188" y="96" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="500" letter-spacing="-1.5" fill="#17201d">scope<tspan fill="#146b53">glass</tspan></text>
  <text x="191" y="126" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" letter-spacing="2.4" fill="#64716c">SEE EVERY RULE IN THE ROOM</text>
</svg>
